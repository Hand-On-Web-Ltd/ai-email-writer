<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Writer — Generate Professional Emails from Bullet Points</title>
    <meta name="description" content="Turn bullet points into professional emails. Pick the email type, enter your points, and copy the result. Free, no sign-up needed.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✉️ AI Email Writer</h1>
            <p>Turn your bullet points into a polished email</p>
        </header>

        <div class="form-section">
            <div class="form-group">
                <label for="emailType">Email Type</label>
                <select id="emailType">
                    <option value="follow-up">Follow-up</option>
                    <option value="cold-outreach">Cold Outreach</option>
                    <option value="thank-you">Thank You</option>
                    <option value="complaint">Complaint</option>
                    <option value="introduction">Introduction</option>
                    <option value="meeting-request">Meeting Request</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="recipientName">Recipient Name</label>
                    <input type="text" id="recipientName" placeholder="e.g. Sarah">
                </div>
                <div class="form-group">
                    <label for="senderName">Your Name</label>
                    <input type="text" id="senderName" placeholder="e.g. James">
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Subject (optional)</label>
                <input type="text" id="subject" placeholder="Leave blank to auto-generate">
            </div>

            <div class="form-group">
                <label for="bulletPoints">Your Key Points (one per line)</label>
                <textarea id="bulletPoints" rows="6" placeholder="Had a great meeting yesterday&#10;Want to follow up on the proposal&#10;Can we schedule a call next week?&#10;Looking forward to working together"></textarea>
            </div>

            <button id="generateBtn" onclick="generateEmail()">Generate Email</button>
        </div>

        <div id="output" style="display:none">
            <div class="output-header">
                <h2>Your Email</h2>
                <button class="copy-btn" onclick="copyEmail()">📋 Copy</button>
            </div>
            <div id="subjectLine" class="subject-line"></div>
            <pre id="emailOutput"></pre>
            <div id="copyMsg" class="copy-msg" style="display:none">Copied!</div>
        </div>

        <footer>
            <p>Built by <a href="https://www.handonweb.com" target="_blank">Hand On Web</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
